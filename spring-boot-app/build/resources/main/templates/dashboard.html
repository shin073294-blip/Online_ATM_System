<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATM Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #383858;
            color: #ffffff;
            margin: 0;
            padding: 40px;
        }
        .welcome-banner {
            max-width: 900px;
            margin: 0 auto 20px auto;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #ffffff;
            color: #333333;
            padding: 30px;
            border-radius: 8px;
        }
        h2 {
            color: #383858;
            border-bottom: 2px solid #eeeeee;
            padding-bottom: 10px;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #dddddd;
        }
        th {
            background-color: #f4f4f9;
            color: #333333;
        }
        .options-list {
            list-style: none;
            padding: 0;
        }
        .options-list li {
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dddddd;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .options-list form {
            display: inline-block;
            margin-left: 20px;
        }
        input[type="number"], input[type="email"] {
            padding: 5px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 6px 12px;
            background-color: #383858;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2c2c44;
        }
        .logout-link {
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="welcome-banner">
    Welcome back, <span th:text="${currentAccount.name}">User</span>!
</div>

<div class="container">
    <h2>Users in Database</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
            <th>Address</th>
            <th>Balance</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="acc : ${allaccount}">
            <td th:text="${acc.id}">1</td>
            <td th:text="${acc.name}">Name</td>
            <td th:text="${acc.email}">Email</td>
            <td th:text="${acc.phoneNumber}">Phone</td>
            <td th:text="${acc.address}">Address</td>
            <td th:text="${acc.balance}">0.0</td>
        </tr>
        </tbody>
    </table>

    <h2>Transaction Options</h2>
    <ul class="options-list">
        <li>
            <strong>1. Deposit Money</strong>
            <form th:action="@{/deposit}" method="POST">
                <input type="number" name="amount" min="1" step="any" placeholder="Enter amount" required>
                <button type="submit">Submit</button>
            </form>
        </li>

        <li>
            <strong>2. Withdraw Money</strong>
            <form th:action="@{/withdraw}" method="POST">
                <input type="number" name="amount" min="1" step="any" placeholder="Enter amount" required>
                <button type="submit">Submit</button>
            </form>
        </li>

        <li>
            <strong>3. Transfer Money</strong>
            <form th:action="@{/transfer}" method="POST">
                <input type="email" name="recipientEmail" placeholder="Recipient email" required>
                <input type="number" name="amount" min="1" step="any" placeholder="Amount" required>
                <button type="submit">Submit</button>
            </form>
        </li>

        <li>
            <strong>4. Top Up</strong>
            <form th:action="@{/topup}" method="POST">
                <input type="number" name="amount" min="1" placeholder="Enter amount" required>
                <button type="submit">Submit</button>
            </form>
        </li>

        <li>
            <strong>5. Check Balance</strong>
            <span style="margin-left: 20px; font-weight: bold; color: #2e7d32;" th:text="'Your current balance is: ' + ${currentAccount.balance}">0.0</span>
        </li>



        <li>
            <strong>7. Logout</strong>
            <a th:href="@{/logout}" class="logout-link" style="margin-left: 20px;">Click here to logout</a>
        </li>


    </ul>
</div>

</body>
</html>
