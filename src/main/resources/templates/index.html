<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ATM System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 380px;
        }
        h1 {
            color: #1e88e5;
            margin-bottom: 5px;
            font-size: 32px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 6px;
            transition: background-color 0.2s ease;
            cursor: pointer;
        }
        .btn-login {
            background-color: #1e88e5;
            border: none;
        }
        .btn-login:hover {
            background-color: #1565c0;
        }
        .btn-create {
            background-color: #43a047;
            border: none;
        }
        .btn-create:hover {
            background-color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="welcome-card">
    <h1>ATM System</h1>
    <p>Welcome! Please choose an option to proceed.</p>

    <div class="btn-container">
        <a th:href="@{/login}" class="btn btn-login">Log In</a>
        <a th:href="@{/register}" class="btn btn-create">Create Account</a>
    </div>
</div>

</body>
</html>
