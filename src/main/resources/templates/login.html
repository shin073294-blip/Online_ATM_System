<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATM - Log In</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #383858;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-family: monospace;
            color: #f4f4f9;
            margin-bottom: 20px;
        }
        .LoginForm {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 380px;
        }
        h2 {
            color: #333;
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #1e88e5;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #1e88e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #1565c0;
        }
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #1e88e5;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #ffcdd2;
            text-align: left;
        }
    </style>
</head>
<body>
<h1> ONLINE ATM SYSTEM </h1>

<div class="LoginForm">
    <h2>Welcome Back!</h2>
    <p>Please enter your data to log in to your account</p>

    <div th:if="${error}" class="error-message">
        <strong>Error:</strong> <span th:text="${error}">Invalid details alert text</span>
    </div>

    <form th:action="@{/login}" th:object="${logininfo}" method="POST">

        <div class="input-group">
            <label>Account Email ✉️</label>
            <input type="email" th:field="*{email}" class="input-field" placeholder="Please Enter Your Account Email" required>
        </div>

        <div class="input-group">
            <label>Password 🔑</label>
            <input type="password" th:field="*{password}" class="input-field" placeholder="Please Enter Your Password" required>
        </div>

        <button type="submit" class="btn-login">🔒 Log In</button>
    </form>

    <a th:href="@{/}" class="back-link">← Go Back Home</a>
</div>

</body>
</html>
