<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATM - Create Account</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #383858;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 {
            font-family: monospace;
            color: #f4f4f9;
            margin-bottom: 20px;
        }

        .RegisterForm {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 420px;
        }

        h2 {
            color: #333;
            margin-bottom: 5px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #43a047;
            outline: none;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #43a047;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #2e7d32;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #1e88e5;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #ffcdd2;
            text-align: left;
        }
    </style>
</head>
<body>

<h1>ONLINE ATM SYSTEM</h1>

<div class="RegisterForm">
    <h2>Create Account</h2>
    <p>Please fill in the details below to open a new account</p>

    <div th:if="${error}" class="error-message">
        <strong>Error:</strong> <span th:text="${error}">Error details text</span>
    </div>

    <form th:action="@{/registerAccount}" th:object="${registerInfo}" method="POST">

        <div class="input-group">
            <label>Full Name 👤</label>
            <input type="text" th:field="*{name}" class="input-field" placeholder="Enter Your Full Name" required>
        </div>

        <div class="input-group">
            <label>Account Email ✉️</label>
            <input type="email" th:field="*{email}" class="input-field" placeholder="Enter Your Email Address" required>
        </div>

        <div class="input-group">
            <label>Phone Number 📱</label>
            <input type="text" th:field="*{phoneNumber}" class="input-field" placeholder="Enter Your Phone Number" required>
        </div>

        <div class="input-group">
            <label>Home Address 🏠</label>
            <input type="text" th:field="*{address}" class="input-field" placeholder="Enter Your Home Address" required>
        </div>

        <div class="input-group">
            <label>Password 🔑</label>
            <input type="text" th:field="*{password}" class="input-field" placeholder="Create a Security Password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password 🔄</label>
            <input type="text" th:field="*{confirmPassword}" class="input-field" placeholder="Retype Your Password" required>
        </div>

        <button type="submit" class="btn-register">📝 Register Account</button>
    </form>

    <a th:href="@{/}" class="back-link">← Cancel and Go Home</a>
</div>

</body>
</html>
