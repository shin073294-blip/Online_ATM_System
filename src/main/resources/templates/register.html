<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATM - Create Account</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #383858;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .RegisterForm {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 380px;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .error-message {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: left;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #43a047;
            outline: none;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #43a047;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .btn-register:hover {
            background-color: #2e7d32;
        }
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #43a047;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="RegisterForm">
    <h1>Create Account</h1>
    <p>Join the ATM Network by filling out your info below</p>


    <!-- Properly binds data to your RegisterInfo request transfer entity object -->
    <form th:action="@{/registerAccount}" th:object="${registerInfo}" method="POST">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" class="input-field" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" class="input-field" placeholder="name@example.com" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" th:field="*{phoneNumber}" class="input-field" placeholder="Enter phone number" required>
        </div>

        <div class="input-group">
            <label>Choose a Password / PIN</label>
            <input type="password" th:field="*{password}" class="input-field" placeholder="Enter password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}" class="input-field" placeholder="Repeat password" required>
        </div>


        <div class="input-group">
            <label>Account Type / Role</label>
            <select th:field="*{role}" class="input-field" required>
                <option value="USER">User</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>

        <button type="submit" class="btn-register"> Sign Up</button>
    </form>

    <a th:href="@{/}" class="back-link">← Go Back Home</a>
</div>

</body>
</html>
